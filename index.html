<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grapple Bounce Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            background-color: #222; /* Dark void background */
            /* Touch-action none is crucial for mobile games to prevent browser gestures */
            touch-action: none; 
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    // --- Setup & Configuration ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Game Objects ---
    const ball = {
        x: width / 2,
        y: 100,
        vx: 0,
        vy: 0,
        radius: 15,
        gravity: 0.4,
        friction: 0.99, // Air resistance
        bounceMultiplier: 0.7 // Elasticity
    };

    // Fixtures/Anchors for the grappling hook
    const anchors = [
        { x: width * 0.3, y: height * 0.2, radius: 10 },
        { x: width * 0.7, y: height * 0.3, radius: 10 },
        { x: width * 0.5, y: height * 0.1, radius: 10 }
    ];

    // Basic Platforms
    const platforms = [
        { x: width * 0.1, y: height * 0.6, w: width * 0.3, h: 20 },
        { x: width * 0.6, y: height * 0.8, w: width * 0.3, h: 20 }
    ];

    const grapple = {
        active: false,
        anchor: null,
        stiffness: 0.05, // Spring stiffness for the swing
        damping: 0.95
    };

    // --- Core Logic ---
    function attachGrapple() {
        if (grapple.active) return;
        
        // Find the nearest anchor
        let nearest = null;
        let minDist = Infinity;
        
        for (let anchor of anchors) {
            let dx = anchor.x - ball.x;
            let dy = anchor.y - ball.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < minDist) {
                minDist = dist;
                nearest = anchor;
            }
        }

        if (nearest) {
            grapple.active = true;
            grapple.anchor = nearest;
        }
    }

    function releaseGrapple() {
        grapple.active = false;
        grapple.anchor = null;
    }

    // --- Input Handling ---
    // Touch Events
    window.addEventListener('touchstart', (e) => {
        e.preventDefault(); // Stop mobile browser gestures
        attachGrapple();
    }, { passive: false });
    
    window.addEventListener('touchend', (e) => {
        e.preventDefault();
        releaseGrapple();
    }, { passive: false });

    // Mouse Events (Laptop/Desktop alternative)
    window.addEventListener('mousedown', attachGrapple);
    window.addEventListener('mouseup', releaseGrapple);

    // Keyboard Events (Laptop/Desktop alternative)
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') attachGrapple();
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') releaseGrapple();
    });

    // --- Game Loop ---
    function update() {
        // 1. Apply Physics
        ball.vy += ball.gravity;

        // Grappling Hook Physics (Spring-based swinging)
        if (grapple.active && grapple.anchor) {
            let dx = grapple.anchor.x - ball.x;
            let dy = grapple.anchor.y - ball.y;
            
            // Pull the ball towards the anchor
            ball.vx += dx * grapple.stiffness;
            ball.vy += dy * grapple.stiffness;
            
            // Add a little damping to the swing so it doesn't spiral out of control
            ball.vx *= grapple.damping;
            ball.vy *= grapple.damping;
        }

        // Apply velocities & air friction
        ball.vx *= ball.friction;
        ball.vy *= ball.friction;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // 2. Collision Detection (Platforms)
        for (let plat of platforms) {
            // Simple AABB (Axis-Aligned Bounding Box) collision for the top of platforms
            if (ball.x > plat.x && ball.x < plat.x + plat.w) {
                // If ball falls through the top of the platform
                if (ball.y + ball.radius > plat.y && ball.y - ball.vy <= plat.y) {
                    ball.y = plat.y - ball.radius;
                    ball.vy = -ball.vy * ball.bounceMultiplier; // Elastic bounce
                    ball.vx *= 0.9; // Friction from hitting the ground
                }
            }
        }

        // 3. Void / Reset Logic (If ball falls off screen)
        if (ball.y > height + 50) {
            // Reset ball position
            ball.x = width / 2;
            ball.y = 100;
            ball.vx = 0;
            ball.vy = 0;
            releaseGrapple();
        }
        
        // Wall boundaries (optional - bouncing off sides)
        if (ball.x - ball.radius < 0) {
            ball.x = ball.radius;
            ball.vx *= -1;
        } else if (ball.x + ball.radius > width) {
            ball.x = width - ball.radius;
            ball.vx *= -1;
        }
    }

    function draw() {
        // Clear screen
        ctx.fillStyle = '#222';
        ctx.fillRect(0, 0, width, height);

        // Draw Grappling Line
        if (grapple.active && grapple.anchor) {
            ctx.beginPath();
            ctx.moveTo(ball.x, ball.y);
            ctx.lineTo(grapple.anchor.x, grapple.anchor.y);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Draw Anchors
        ctx.fillStyle = '#f39c12';
        for (let anchor of anchors) {
            ctx.beginPath();
            ctx.arc(anchor.x, anchor.y, anchor.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw Platforms
        ctx.fillStyle = '#27ae60';
        for (let plat of platforms) {
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        }

        // Draw Ball
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Start the game
    loop();

</script>
</body>
</html>
